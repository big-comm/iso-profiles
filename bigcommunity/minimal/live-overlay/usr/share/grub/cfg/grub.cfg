# BigCommunity live GRUB configuration
# The menu language can be selected before boot. Keyboard and timezone remain
# independent and may still be changed by the graphical live setup wizard.

insmod font
insmod part_msdos
insmod part_gpt
insmod regexp

set pager=1
set menu_color_normal=light-gray/black
set menu_color_highlight=light-magenta/black

function menu_reload {
    configfile /boot/grub/grub.cfg
}

# Load local defaults first, but retain safe built-in fallbacks if a source
# package is incomplete.
if [ -f /boot/grub/variable.cfg ]; then
    source /boot/grub/variable.cfg
fi
if [ -f /boot/grub/profile.cfg ]; then
    source /boot/grub/profile.cfg
fi
if [ -f /boot/grub/defaults.cfg ]; then
    source /boot/grub/defaults.cfg
fi
if [ -z "${grub_theme}" ]; then
    set grub_theme="/boot/grub/themes/bigcommunity-live/theme.txt"
fi
if [ -z "${gfxmode}" ]; then
    set gfxmode="1024x768,800x600,auto"
fi
if [ -z "${timeout}" ]; then
    set timeout=10
fi
if [ -z "${timeout_style}" ]; then
    set timeout_style=menu
fi
if [ -z "${default}" ]; then
    set default=0
fi

# Keep the GRUB package translations as the primary catalog and load the
# BigCommunity live-menu strings from a separate catalog. Changing "lang"
# automatically reloads both catalogs through the gettext module hooks.
if [ -z "${lang}" ]; then
    set lang="en"
fi
set locale_dir="/boot/grub/locales"
set secondary_locale_dir="/boot/grub/locales/bigcommunity"
insmod gettext
export lang
export locale_dir
export secondary_locale_dir

# The theme uses a solid color rather than a full-screen image. This avoids
# decoding or scaling a large background on firmware with limited video memory.
# Terminus Bold 22 remains the primary theme font. unicode.pf2 supplies glyph
# fallback for Cyrillic, Greek, Hebrew, Japanese, Korean and Chinese.
set gfx_ready=false
set theme_ready=false
if [ -f /boot/grub/unicode.pf2 ]; then
    if loadfont /boot/grub/unicode.pf2; then
        set gfx_ready=true
        set theme_ready=true
    fi
fi
if loadfont /boot/grub/themes/bigcommunity-live/ter-u22b.pf2; then
    set gfx_ready=true
    set theme_ready=true
fi

if [ "${gfx_ready}" = "true" ]; then
    insmod all_video
    insmod gfxterm
    insmod gfxmenu
    insmod png

    if terminal_output --append gfxterm; then
        terminal_output --remove console
        if [ "${theme_ready}" = "true" ]; then
            if [ -f "${grub_theme}" ]; then
                set theme="${grub_theme}"
                export theme
            fi
        fi
    fi
fi

# Loopback ISO support. Extra parameters are appended last so a caller can
# override defaults when booting the ISO from another GRUB installation.
set auto=""
if [ -n "${iso_path}" ]; then
    if [ -z "${rootuuid}" ]; then
        probe -s rootuuid -u ${root}
    fi
    if [ -n "${rootuuid}" ]; then
        set auto="img_dev=/dev/disk/by-uuid/${rootuuid} img_loop=${iso_path}"
    fi
fi

set kopts="${bootlang} ${keyboard} ${timezone} ${hwclock}"
if [ -n "${auto}" ]; then
    set kopts="${kopts} ${auto}"
fi
if [ -n "${clinput}" ]; then
    set kopts="${kopts} ${clinput}"
fi
export kopts
export auto
export clinput
export bootlang
export keyboard
export timezone
export hwclock
export def_bootlang

# kernels.cfg also acts as the menu dispatcher. Nested menus are opened with
# a nested normal-mode instance, allowing an explicit first "Back" entry to
# return exactly one level through normal_exit.
if [ -z "${bigcommunity_menu}" ]; then
    set bigcommunity_menu="root"
fi
export bigcommunity_menu
source /boot/grub/kernels.cfg
