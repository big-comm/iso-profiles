# BigCommunity live localization defaults. The language selector updates
# def_bootlang and bootlang without coupling language to keyboard or timezone.
if [ -z "${def_bootlang}" ]; then
    set def_bootlang="en_US"
fi
if [ -z "${bootlang}" ]; then
    set bootlang="lang=${def_bootlang}"
fi
if [ -z "${keyboard}" ]; then
    set keyboard="keytable=us"
fi
if [ -z "${timezone}" ]; then
    set timezone="tz=UTC"
fi
