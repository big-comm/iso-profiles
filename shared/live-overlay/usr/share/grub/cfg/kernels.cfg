# BigCommunity live boot profiles and numbered menu dispatcher
#
# Support references are stable because the visible number is part of each
# label. Menus ending in ">>" reload the dispatcher in a child state. Every
# nested menu starts with a .0 entry that selects and reloads its parent state.
# The language selector expands inline so its entries remain next to item 4.

if [ -z "${bigcommunity_iso_label}" ]; then
    set bigcommunity_iso_label="BIGCOMMUNITYLIVE"
fi
if [ -z "${bigcommunity_iso_base}" ]; then
    set bigcommunity_iso_base="bigcommunity"
fi

function boot_bigcommunity {
    set gfxpayload=keep
    linux /boot/vmlinuz-x86_64 \
        misobasedir=${bigcommunity_iso_base} misolabel=${bigcommunity_iso_label} rw \
        $@ \
        quiet loglevel=3 systemd.show_status=auto rd.udev.log_level=3 splash \
        ${kopts}
    initrd /boot/amd_ucode.img /boot/intel_ucode.img /boot/initramfs-@ARCH@.img
}

function boot_bigcommunity_verbose {
    # UEFI normally has no legacy VGA text mode. Preserve the firmware
    # framebuffer on UEFI and request native text only on legacy BIOS.
    if [ "${grub_platform}" = "efi" ]; then
        set gfxpayload=keep
    else
        set gfxpayload=text
    fi
    linux /boot/vmlinuz-x86_64 \
        misobasedir=${bigcommunity_iso_base} misolabel=${bigcommunity_iso_label} rw \
        $@ \
        loglevel=4 systemd.show_status=yes rd.udev.log_level=info \
        ${kopts}
    initrd /boot/amd_ucode.img /boot/intel_ucode.img /boot/initramfs-@ARCH@.img
}

# Do not auto-select a workaround while the user is reading a nested menu.
if [ "${bigcommunity_menu}" != "root" ]; then
    set timeout=-1
    set default=0
fi
if [ "${bigcommunity_language_expanded}" = "true" ]; then
    set timeout=-1
    set default=3
fi

# driver=nonfree permits proprietary drivers when matching hardware needs them;
# Intel, AMD and normal kernel devices continue to use open-source drivers.

if [ "${bigcommunity_menu}" = "root" ]; then
    menuentry $"1 - Start BigCommunity (recommended)" --class=bigcommunity {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"2 - Start without proprietary drivers" --class=opensource {
        boot_bigcommunity wayland driver=free
    }

    menuentry $"3 - More boot options and hardware fixes  >>" --class=advanced-submenu {
        set bigcommunity_menu="3"
        menu_reload
    }

    if [ -z "${language_name}" ]; then
        set language_name="English"
    fi
    menuentry $"4 - Language: ${language_name}  >>" --class=language-submenu {
        set bigcommunity_language_expanded="true"
        export bigcommunity_language_expanded
        menu_reload
    }
    if [ "${bigcommunity_language_expanded}" = "true" ]; then
        source /boot/grub/languages.cfg
    fi

    if [ "${grub_platform}" = "efi" ]; then
        menuentry $"5 - Detect EFI bootloaders  >>" --class=efi-submenu {
            set bigcommunity_menu="efi"
            menu_reload
        }
    fi

    if [ "${grub_platform}" = "efi" ]; then
        if [ -f /boot/memtest-efi ]; then
            menuentry $"6 - Run memory test" --class=memtest {
                insmod chain
                chainloader /boot/memtest-efi
            }
        fi
    else
        if [ -f /boot/memtest ]; then
            menuentry $"6 - Run memory test" --class=memtest {
                linux16 /boot/memtest
            }
        fi
    fi

    menuentry $"7 - Restart computer" --class=restart {
        reboot
    }

    if [ -n "${clinput}" ]; then
        menuentry $"8 - Clear extra boot parameters" --class=edit {
            unset clinput
            menu_reload
        }
    fi

elif [ "${bigcommunity_menu}" = "3" ]; then
    menuentry $"3.0 - Back to main menu" --class=back {
        set bigcommunity_menu="root"
        menu_reload
    }

    menuentry $"3.1 - Graphics and drivers  >>" --class=display-submenu {
        set bigcommunity_menu="3.1"
        menu_reload
    }

    menuentry $"3.2 - Storage, PCI and IOMMU  >>" --class=storage-submenu {
        set bigcommunity_menu="3.2"
        menu_reload
    }

    menuentry $"3.3 - Firmware and legacy hardware  >>" --class=firmware-submenu {
        set bigcommunity_menu="3.3"
        menu_reload
    }

    menuentry $"3.4 - Desktop responsiveness  >>" --class=performance-submenu {
        set bigcommunity_menu="3.4"
        menu_reload
    }

    menuentry $"3.5 - Dual-GPU laptops with NVIDIA  >>" --class=nvidia-submenu {
        set bigcommunity_menu="3.5"
        menu_reload
    }

    menuentry $"3.6 - Diagnostics  >>" --class=diagnostics-submenu {
        set bigcommunity_menu="3.6"
        menu_reload
    }

elif [ "${bigcommunity_menu}" = "3.1" ]; then
    menuentry $"3.1.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.1.1 - Wayland (proprietary drivers allowed)" --class=display {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.1.2 - Wayland (no proprietary drivers)" --class=display {
        boot_bigcommunity wayland driver=free
    }

    menuentry $"3.1.3 - X11 (proprietary drivers allowed)" --class=display {
        boot_bigcommunity driver=nonfree nouveau.modeset=0
    }

    menuentry $"3.1.4 - X11 (no proprietary drivers)" --class=display {
        boot_bigcommunity driver=free
    }

    menuentry $"3.1.5 - Intel display workaround (disable PSR)" --class=display {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 i915.enable_psr=0 xe.enable_psr=0
    }

    menuentry $"3.1.6 - Intel graphics driver selection (expert)  >>" --class=intel-submenu {
        set bigcommunity_menu="3.1.6"
        menu_reload
    }

    menuentry $"3.1.7 - AMD APU flicker workaround" --class=display {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 amdgpu.sg_display=0
    }

    menuentry $"3.1.8 - Older AMD GCN driver selection (expert)  >>" --class=amd-submenu {
        set bigcommunity_menu="3.1.8"
        menu_reload
    }

    menuentry $"3.1.9 - AMD GPU hang recovery (experimental)" --class=display {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 amdgpu.gpu_recovery=1
    }

elif [ "${bigcommunity_menu}" = "3.1.6" ]; then
    menuentry $"3.1.6.0 - Back to menu 3.1" --class=back {
        set bigcommunity_menu="3.1"
        menu_reload
    }

    menuentry $"3.1.6.1 - Automatic Intel driver selection" --class=intel {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.1.6.2 - Force i915 for recognized Intel GPUs" --class=intel {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 "i915.force_probe=*" "xe.force_probe=!*"
    }

    menuentry $"3.1.6.3 - Force Xe for recognized Intel GPUs" --class=intel {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 "i915.force_probe=!*" "xe.force_probe=*"
    }

elif [ "${bigcommunity_menu}" = "3.1.8" ]; then
    menuentry $"3.1.8.0 - Back to menu 3.1" --class=back {
        set bigcommunity_menu="3.1"
        menu_reload
    }

    menuentry $"3.1.8.1 - Prefer AMDGPU for SI/CIK" --class=amd {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 radeon.si_support=0 amdgpu.si_support=1 radeon.cik_support=0 amdgpu.cik_support=1
    }

    menuentry $"3.1.8.2 - Prefer Radeon for SI/CIK" --class=amd {
        boot_bigcommunity driver=nonfree nouveau.modeset=0 radeon.si_support=1 amdgpu.si_support=0 radeon.cik_support=1 amdgpu.cik_support=0
    }

elif [ "${bigcommunity_menu}" = "3.2" ]; then
    menuentry $"3.2.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.2.1 - NVMe power-state workaround" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 nvme_core.default_ps_max_latency_us=0
    }

    menuentry $"3.2.2 - Keep firmware PCIe power settings" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 pcie_aspm=off
    }

    menuentry $"3.2.3 - Suppress PCIe AER flood" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 pci=noaer
    }

    menuentry $"3.2.4 - Intel IOMMU: disable scalable mode" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 intel_iommu=sm_off
    }

    menuentry $"3.2.5 - Intel IOMMU: bypass integrated graphics" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 intel_iommu=igfx_off
    }

    menuentry $"3.2.6 - Disable hardware IOMMU" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 iommu=off
    }

    menuentry $"3.2.7 - Use software DMA bounce buffering" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 iommu=soft
    }

    menuentry $"3.2.8 - Disable PCI MSI interrupts" --class=storage {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 pci=nomsi
    }

    menuentry $"3.2.9 - Poll interrupt handlers" --class=storage {
        boot_bigcommunity_verbose driver=free irqpoll
    }

    menuentry $"3.2.10 - Disable PCI MMCONFIG" --class=storage {
        boot_bigcommunity_verbose driver=free pci=nommconf
    }

elif [ "${bigcommunity_menu}" = "3.3" ]; then
    menuentry $"3.3.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.3.1 - Disable ACPI IRQ routing" --class=firmware {
        boot_bigcommunity_verbose driver=free acpi=noirq
    }

    menuentry $"3.3.2 - Disable ACPI for PCI routing" --class=firmware {
        boot_bigcommunity_verbose driver=free pci=noacpi
    }

    menuentry $"3.3.3 - Disable x2APIC" --class=firmware {
        boot_bigcommunity_verbose driver=free nox2apic
    }

    menuentry $"3.3.4 - Disable I/O APIC" --class=firmware {
        boot_bigcommunity_verbose driver=free noapic
    }

    menuentry $"3.3.5 - Skip IO-APIC timer test (old boards)" --class=firmware {
        boot_bigcommunity_verbose driver=free no_timer_check
    }

    menuentry $"3.3.6 - Disable HPET" --class=firmware {
        boot_bigcommunity_verbose driver=free nohpet
    }

    menuentry $"3.3.7 - Last resort: disable ACPI completely" --class=safe {
        boot_bigcommunity_verbose driver=free acpi=off
    }

elif [ "${bigcommunity_menu}" = "3.4" ]; then
    menuentry $"3.4.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.4.1 - Kernel default preemption" --class=performance {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.4.2 - Force full preemption" --class=performance {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 preempt=full
    }

    menuentry $"3.4.3 - Full preemption + threaded IRQs" --class=performance {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 preempt=full threadirqs
    }

    menuentry $"3.4.4 - Lazy preemption" --class=performance {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 preempt=lazy
    }

elif [ "${bigcommunity_menu}" = "3.5" ]; then
    # mhwd-biglinux exposes hybrid, nvidia and integrated modes.
    menuentry $"3.5.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.5.1 - Hybrid mode (Wayland, recommended)" --class=nvidia {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.5.2 - Hybrid mode (X11 fallback)" --class=nvidia {
        boot_bigcommunity driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.5.3 - Integrated GPU only (disable NVIDIA)" --class=nvidia {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 bignvidia=integrated module_blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm,nouveau
    }

    menuentry $"3.5.4 - NVIDIA as primary GPU (X11)" --class=nvidia {
        boot_bigcommunity driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 \
            nvidia.NVreg_DynamicPowerManagement=0x00 bignvidia=nvidia
    }

elif [ "${bigcommunity_menu}" = "3.6" ]; then
    menuentry $"3.6.0 - Back to menu 3" --class=back {
        set bigcommunity_menu="3"
        menu_reload
    }

    menuentry $"3.6.1 - Verbose boot" --class=diagnostics {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1
    }

    menuentry $"3.6.2 - Watchdog and clock diagnostics  >>" --class=watchdog-submenu {
        set bigcommunity_menu="3.6.2"
        menu_reload
    }

    menuentry $"3.6.3 - Legacy module: disable kernel IBT" --class=diagnostics {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 ibt=off
    }

    menuentry $"3.6.4 - Legacy software: disable split-lock detection" --class=diagnostics {
        boot_bigcommunity wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 split_lock_detect=off
    }

    menuentry $"3.6.5 - Disable PAT" --class=diagnostics {
        boot_bigcommunity_verbose driver=nonfree nouveau.modeset=0 nopat
    }

    menuentry $"3.6.6 - Last resort: disable interrupt remapping" --class=diagnostics {
        boot_bigcommunity_verbose driver=free intremap=off
    }

elif [ "${bigcommunity_menu}" = "3.6.2" ]; then
    menuentry $"3.6.2.0 - Back to menu 3.6" --class=back {
        set bigcommunity_menu="3.6"
        menu_reload
    }

    menuentry $"3.6.2.1 - Increase lockup timeout" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 watchdog_thresh=30
    }

    menuentry $"3.6.2.2 - Disable NMI hard-lockup detector" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 nmi_watchdog=0
    }

    menuentry $"3.6.2.3 - Disable soft-lockup detector" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 nosoftlockup
    }

    menuentry $"3.6.2.4 - Disable both kernel lockup detectors" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 nowatchdog
    }

    menuentry $"3.6.2.5 - Use fallback clocksource (TSC unstable)" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 tsc=unstable
    }

    menuentry $"3.6.2.6 - Disable TSC clocksource watchdog" --class=watchdog {
        boot_bigcommunity_verbose wayland driver=nonfree nouveau.modeset=0 nvidia_drm.modeset=1 tsc=nowatchdog
    }

elif [ "${bigcommunity_menu}" = "efi" ]; then
    menuentry $"5.0 - Back to main menu" --class=back {
        set bigcommunity_menu="root"
        menu_reload
    }

    set efi_found=false
    insmod chain

    for efi in \
        (*,gpt*)/efi/*/*.efi \
        (*,gpt*)/efi/*/*/*.efi \
        (*,gpt*)/*.efi \
        (*,gpt*)/*/*.efi \
        (*,msdos*)/efi/*/*.efi \
        (*,msdos*)/efi/*/*/*.efi \
        (*,msdos*)/*.efi \
        (*,msdos*)/*/*.efi; do
        if [ -e "${efi}" ]; then
            regexp --set=1:efi_device '^\((.*)\)/' "${efi}"
            set efi_found=true
            menuentry $"5.x - ${efi}" --class=efi "${efi}" "${efi_device}" {
                set root="${3}"
                chainloader "${2}"
            }
        fi
    done

    if [ "${efi_found}" != "true" ]; then
        menuentry $"5.1 - No EFI files detected" --class=safe {
            set bigcommunity_menu="root"
            menu_reload
        }
    fi

else
    # Unknown dispatcher state: recover to the main menu rather than exposing an
    # empty screen.
    menuentry $"0 - Back to main menu" --class=back {
        set bigcommunity_menu="root"
        menu_reload
    }
fi
