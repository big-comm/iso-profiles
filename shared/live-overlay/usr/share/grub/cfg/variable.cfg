# BigCommunity live GRUB defaults
set grub_theme="/boot/grub/themes/bigcommunity-live/theme.txt"
set timeout=10
set timeout_style=menu
set default=0

# Prefer conservative modes on old firmware. "auto" remains a fallback for
# UEFI/GOP implementations which expose only the panel's native resolution.
set gfxmode="1024x768,800x600,auto"
